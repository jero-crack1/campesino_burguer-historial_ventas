services:
  - type: web
    name: campesino-burguer-api
    env: node
    region: oregon
    plan: free
    rootDir: campesino_burguer-historial_ventas/backend
    buildCommand: npm install && npm run db:migrate && npm run db:seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PORT
        value: 4000

  - type: web
    name: campesino-burguer-frontend
    env: static
    rootDir: campesino_burguer-historial_ventas/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
